name: build_and_test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        run: |
          curl -fsSL https://ziglang.org/download/0.15.2/zig-aarch64-macos-0.15.2.tar.xz -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "${GITHUB_WORKSPACE}/zig-aarch64-macos-0.15.2" >> "${GITHUB_PATH}"

      - name: Resolve macOS SDK
        run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "${GITHUB_ENV}"

      - name: Build
        run: zig build -Dtarget=aarch64-macos -Doptimize=ReleaseSafe

      - name: Test
        run: zig build test -Dtarget=aarch64-macos -Doptimize=ReleaseSafe
